[pytest]
# The project venv inherits system site-packages, which on this machine includes
# ROS 2 (Jazzy). Its pytest entry-point plugins (launch_testing, ament_*) fail to
# import (missing `lark`) and would abort collection. They are irrelevant here, so
# we disable them explicitly. This keeps `pytest` working out of the box without
# needing PYTEST_DISABLE_PLUGIN_AUTOLOAD.
addopts =
    -p no:launch_testing
    -p no:launch_ros
    -p no:ament_flake8
    -p no:ament_pep257
    -p no:ament_copyright
    -p no:ament_xmllint
    -p no:ament_lint
testpaths = tests
